<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Capturas</title>
    <link rel="stylesheet" type="text/css" href="stylesheet/main.css">
    <link rel="stylesheet" type="text/css" href="stylesheet/mobile.css">
    <script type="text/javascript" src="javascript/event.js" defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link rel="shortcut icon" href="assets/Steam_icon_logo.svg.png" type="image/x-icon"/>

</head>
<body>
    <div id="steamid-modal" class="steamid-modal">
      <div class="steamid-modal-content">
        <h2>Digite o SteamID para ver as capturas</h2>
        <h3>
  <a href="https://steamidcheck.com/" target="_blank">
    Não sabe seu SteamID? Aqui pode ajudar a achar.
  </a>
</h3>
        <input type="text" id="input-steamid" placeholder="Ex: 7656119..." />
        <button id="btn-buscar-steamid">Buscar</button>
      </div>
    </div>
    <section id="inicio">
        <div class="container2">
        <div class="titulo">
            <h1>Capturas <span id="textoneon1">Legais</span></h1>
            <img src="assets/Steam_icon_logo.svg.png" alt="">
        </div>
        <div id="destaque">
             <div class="quadrados">
  <div class="quadrado quadrado1"></div>
  <div class="quadrado quadrado2"></div>
  <div class="quadrado quadrado3"></div>
</div>       
        </div>
    </div>
 <section>
      <div id="cardTreinador">
        <h2>Card do Treinador</h2>
        <img src="" alt="">
        <p>Descrição do card do treinador.</p>
      </div>
    </section>
    </section>
<div style="display: flex; justify-content: center; gap: 2rem; margin: 2rem 0; align-items: center; flex-wrap: wrap;">
  <label style="display: flex; align-items: center; gap: 0.5rem;">
    <input type="checkbox" id="cb-holo" /> Holo em todos
  </label>
  <label style="display: flex; align-items: center; gap: 0.5rem;">
    <input type="checkbox" id="cb-fullart" /> Full Art em todos
  </label>
  <label style="display: flex; align-items: center; gap: 0.5rem;">
    <input type="checkbox" id="cb-padrao" checked /> Aleatório (padrão)
  </label>
</div>
<div id="cards"></div>
  <div id="card-modal" class="card-modal" style="display:none;">
    <div class="card card-ampliada">
      <h3 id="modalTitulo"></h3>
      <img id="modalImagem" src="" alt="">
      <div class="info-screen">
        
        <p id="modalDescricao"></p>
      </div>
      
    </div>
  </div>
</body>
</html>
